<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Gothic Chronicle (Prototype)</title>

<meta name="theme-color" content="#060606" />
<link rel="icon" href="assets/favicon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet" />
<link rel="preload" as="image" href="assets/opening.webp" fetchpriority="high" />

<style>
:root { color-scheme: dark; }

html, body { height: 100%; }

body{
  margin:0;
  background:#060606;
  color:#e7e7e7;
  font-family: ui-serif, Georgia, "Times New Roman", serif;
  line-height:1.45;
  overflow: auto;
}

/* Simple centered layout */
.wrap{
  max-width: 980px;
  margin: 0 auto;
  padding: 18px;
  box-sizing: border-box;
}

/* Stack title + game and hide/show screens */
.screen-stack{ position: relative; }
.screen{ display:none; }
.screen.is-active{ display:block; }

.panel{
  background:#0d0d0d;
  border:1px solid #1e1e1e;
  border-radius:14px;
  padding:14px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.35);
  box-sizing: border-box;
}

/* --------------------------------
   GAME UI: fixed image + scrollable bottom
---------------------------------- */
.panel.game-shell{
  display: grid;
  grid-template-rows: auto 1fr;
  height: calc(100dvh - 36px);
  max-height: calc(100dvh - 36px);
  gap: 10px;
}

/* Top hero stays visible */
.top-hero{
  position: sticky;
  top: 0;
  z-index: 5;
  min-height: 0;
  padding-bottom: 14px;
}

/* Bottom area is the only scroller */
.bottom-ui{
  min-height: 0;
  overflow-y: scroll;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;

  padding-right: 10px;
  max-width: 740px;
  margin: 0 auto;

  scrollbar-width: thin;
  scrollbar-color: #6b0000 #050505;

  box-shadow: inset -8px 0 10px rgba(120,0,0,0.10);
  position: relative;

  cursor: grab;
}

.bottom-ui:active{
  cursor: grabbing;
}

/* ===== Scroll fades ===== */
.bottom-ui::before,
.bottom-ui::after{
  content:"";
  position: sticky;
  left: 0;
  right: 0;
  height: 18px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 180ms ease;
  z-index: 20;
}

.bottom-ui::before{
  top: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.85), rgba(0,0,0,0));
}

.bottom-ui::after{
  bottom: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0));
}

.bottom-ui.can-scroll:not(.at-top)::before{ opacity: 1; }
.bottom-ui.can-scroll:not(.at-bottom)::after{ opacity: 1; }

/* Scrollbar styling */
.bottom-ui::-webkit-scrollbar{ width: 16px; }
.bottom-ui::-webkit-scrollbar-track{ background:#050505; }
.bottom-ui::-webkit-scrollbar-thumb{
  background: linear-gradient(to bottom, #3a0000, #8b0000);
  border-radius: 10px;
  border: 2px solid #050505;
}
.bottom-ui::-webkit-scrollbar-thumb:hover{ background:#a00000; }

.top-hero .frame-wrap{ margin: 0 auto; }

/* ==========================================
   DESKTOP HERO SIZE FIX
========================================== */
@media (min-width: 820px){
  .top-hero .frame-wrap{
    max-width: 640px;
    margin: 6px auto 10px auto;
    overflow: visible;
  }

  #sceneImage{
    width: 100%;
    height: auto;
    max-height: min(46dvh, 440px);
    object-fit: contain;
  }

  /* FIX: slightly reduce desktop title height */
  .title-img{
    max-height: 64vh;
  }
}

/* --- Victorian Frame --- */
.frame-wrap{
  width: 100%;
  max-width: 560px;
  margin: 12px auto 14px auto;
  position: relative;
  border-radius: 16px;
  padding: 16px;
  background:
    radial-gradient(120% 120% at 30% 20%, rgba(255,255,255,0.06), transparent 55%),
    linear-gradient(135deg, #2a1b0d, #0f0b07 45%, #2a1b0d);
  border: 1px solid #2a211a;
  box-shadow:
    0 14px 35px rgba(0,0,0,0.55),
    inset 0 0 0 1px rgba(255,255,255,0.04);
}

#sceneImage{
  display:block;
  width:100%;
  height:auto;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.65);
  box-shadow: 0 10px 22px rgba(0,0,0,0.45);
  filter: contrast(1.05) saturate(0.95);
  opacity: 0;
  transform: scale(0.985);
  transition: opacity 650ms ease, transform 650ms ease;
  will-change: opacity, transform;
}
#sceneImage.is-loaded{
  opacity: 1;
  transform: scale(1);
}

/* Title Screen */
.title-card{
  width: 100%;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid #1e1e1e;
  box-shadow: 0 14px 40px rgba(0,0,0,0.55);
  background: #0b0b0b;
  position: relative;
  max-height: calc(100dvh - 36px);
}

/* FIX: adjust framing so bottom isn't clipped */
.title-img{
  width:100%;
  height:auto;
  display:block;
  object-position: center 18%;
  filter: contrast(1.02) saturate(0.95);
  max-height: 72vh;
}

/* overlay */
.title-overlay{
  position:absolute;
  inset: 0;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding: 18px;
  background:
    radial-gradient(120% 90% at 50% 20%, rgba(0,0,0,0.15), rgba(0,0,0,0.80)),
    linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.20) 60%, rgba(0,0,0,0.10));
  z-index: 2;
}

.title-logo{
  font-family: "UnifrakturCook", cursive;
  font-size: clamp(42px, 6.5vw, 82px);
  letter-spacing: 2px;
  color:#6b0000;
}

.title-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top: 14px;
}

.titlebtn{
  padding: 10px 14px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="wrap">
  <main class="screen-stack">

    <!-- TITLE SCREEN -->
    <section id="titleScreen" class="screen is-active" aria-label="Title Screen">
      <div class="title-card">

        <img
          class="title-img"
          src="assets/opening.webp"
          alt="Gothic Chronicle Title"
          fetchpriority="high"
          decoding="sync"
        />

        <div class="title-overlay">
          <div class="title-logo">Gothic Chronicle</div>

          <div class="title-actions">
            <button class="tinybtn titlebtn" id="btnStart" type="button">Begin</button>
            <button class="tinybtn titlebtn" id="btnContinue" type="button" style="display:none;">Continue</button>
          </div>

          <div class="title-hint">
            Press <span class="kbd">Enter</span> to begin
          </div>
        </div>

      </div>
    </section>

    <!-- GAME UI -->
    <section id="gameUI" class="screen" aria-label="Game">
      <div class="panel game-shell">

        <div id="sceneImageMount" class="image-zone top-hero"></div>

        <div class="bottom-ui" id="bottomUI">

          <div id="scene" class="scene" aria-live="polite"></div>
          <div id="meta" class="meta"></div>

          <div class="divider"></div>

          <div class="choices" id="choices"></div>

        </div>
      </div>
    </section>

  </main>
</div>

<script src="game.js" defer></script>

</body>
</html>
