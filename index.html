<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Gothic Chronicle (Prototype)</title>

<meta name="theme-color" content="#060606" />
<link rel="icon" href="assets/favicon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet" />
<link rel="preload" as="image" href="assets/opening.webp" fetchpriority="high" />

<style>
:root { color-scheme: dark; }

html, body { height: 100%; }

body{
  margin:0;
  background:#060606;
  color:#e7e7e7;
  font-family: ui-serif, Georgia, "Times New Roman", serif;
  line-height:1.45;
  overflow:auto;
}

/* Layout */

.wrap{
  max-width: 980px;
  margin: 0 auto;
  padding: 18px;
  box-sizing: border-box;
}

.screen-stack{ position: relative; }
.screen{ display:none; }
.screen.is-active{ display:block; }

.panel{
  background:#0d0d0d;
  border:1px solid #1e1e1e;
  border-radius:14px;
  padding:14px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.35);
  box-sizing: border-box;
}

/* ---------------- TITLE SCREEN ---------------- */

.title-card{
  width:100%;
  border-radius:14px;
  overflow:hidden;
  border:1px solid #1e1e1e;
  box-shadow:0 14px 40px rgba(0,0,0,0.55);
  background:#0b0b0b;
  position:relative;
}

.title-img{
  width:100%;
  height:auto;
  max-height:72vh;
  display:block;
  object-fit:cover;
  object-position:center top;
  filter:contrast(1.02) saturate(0.95);
}

/* ===== FOG LAYERS ===== */

.fog-layer{
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:.35;
  mix-blend-mode:screen;
}

.fog1{
  background:
    radial-gradient(60% 40% at 30% 40%, rgba(255,255,255,0.12), transparent 70%),
    radial-gradient(40% 30% at 70% 60%, rgba(255,255,255,0.10), transparent 70%);
  animation:fogDrift1 60s linear infinite;
}

.fog2{
  background:
    radial-gradient(50% 40% at 60% 30%, rgba(255,255,255,0.10), transparent 70%),
    radial-gradient(60% 50% at 20% 70%, rgba(255,255,255,0.08), transparent 70%);
  animation:fogDrift2 95s linear infinite;
}

@keyframes fogDrift1{
  0%{ transform:translateX(-5%) translateY(0) scale(1); }
  50%{ transform:translateX(5%) translateY(2%) scale(1.05); }
  100%{ transform:translateX(-5%) translateY(0) scale(1); }
}

@keyframes fogDrift2{
  0%{ transform:translateX(5%) translateY(0) scale(1.1); }
  50%{ transform:translateX(-5%) translateY(-2%) scale(1.15); }
  100%{ transform:translateX(5%) translateY(0) scale(1.1); }
}

/* Overlay text */

.title-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:18px;
  background:
    radial-gradient(120% 90% at 50% 20%, rgba(0,0,0,0.15), rgba(0,0,0,0.80)),
    linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.20) 60%, rgba(0,0,0,0.10));
}

.title-logo{
  font-family:"UnifrakturCook", cursive;
  font-size:clamp(42px,6.5vw,82px);
  letter-spacing:2px;
  color:#6b0000;
  text-shadow:
    0 0 6px rgba(255,255,255,0.12),
    0 0 14px rgba(0,0,0,0.9),
    0 4px 14px rgba(0,0,0,0.95),
    0 0 14px rgba(120,0,0,0.7);
  line-height:1;
}

.title-sub{
  margin-top:6px;
  color:#c6c6c6;
  font-size:13px;
}

.title-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:14px;
}

.tinybtn{
  background:#111;
  border:1px solid #2a2a2a;
  color:#ddd;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
}

.title-hint{
  margin-top:12px;
  color:#b8b8b8;
  font-size:12px;
}

.kbd{
  font-family: ui-monospace, Menlo, Consolas, monospace;
  font-size:12px;
  border:1px solid #2a2a2a;
  border-bottom-color:#444;
  padding:1px 6px;
  border-radius:8px;
  background:#0a0a0a;
}

/* ------------- GAME UI (unchanged) ------------- */

.panel.game-shell{
  display:grid;
  grid-template-rows:auto 1fr;
  height:calc(100dvh - 36px);
  max-height:calc(100dvh - 36px);
  gap:10px;
}

.top-hero{
  position:sticky;
  top:0;
  z-index:5;
  padding-bottom:14px;
}

.bottom-ui{
  overflow-y:scroll;
  overflow-x:hidden;
  padding-right:10px;
  max-width:740px;
  margin:0 auto;
}

.scene{
  font-size:18px;
  line-height:1.55;
  padding-top:6px;
}

.meta{
  color:#bdbdbd;
  font-size:13px;
  margin-top:10px;
}

.choices{
  margin-top:12px;
  display:grid;
  gap:10px;
}

button.choice{
  text-align:left;
  background:#0b0b0b;
  color:#f0f0f0;
  border:1px solid #2a2a2a;
  border-radius:12px;
  padding:11px 12px;
  cursor:pointer;
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  margin-top:12px;
}

details#drawer{
  margin-top:12px;
  border:1px solid #1e1e1e;
  border-radius:12px;
  background:#070707;
}

pre{
  margin:0;
  white-space:pre-wrap;
  word-break:break-word;
  padding:12px;
  font-family: ui-monospace, Menlo, Consolas, monospace;
  font-size:12px;
}
</style>
</head>

<body>

<div class="wrap">
<main class="screen-stack">

<!-- TITLE SCREEN -->
<section id="titleScreen" class="screen is-active">

<div class="title-card">

<img
class="title-img"
src="assets/opening.webp"
alt="Gothic Chronicle Title"
fetchpriority="high"
decoding="sync"
/>

<div class="fog-layer fog1"></div>
<div class="fog-layer fog2"></div>

<div class="title-overlay">

<div class="title-logo">Gothic Chronicle</div>
<div class="title-sub">A gothic interactive fiction</div>

<div class="title-actions">
<button class="tinybtn" id="btnStart">Begin</button>
<button class="tinybtn" id="btnContinue" style="display:none;">Continue</button>
</div>

<div class="title-hint">
Press <span class="kbd">Enter</span> to begin
</div>

</div>
</div>
</section>

<!-- GAME UI -->
<section id="gameUI" class="screen">

<div class="panel game-shell">

<div id="sceneImageMount" class="top-hero"></div>

<div class="bottom-ui" id="bottomUI">

<div id="scene" class="scene"></div>
<div id="meta" class="meta"></div>

<div class="choices" id="choices"></div>

<details id="drawer" style="display:none;">
<summary id="drawerTitle">Drawer</summary>
<pre id="drawerBody"></pre>
</details>

<div class="row">

<button class="tinybtn" id="btnInv">Inventory</button>
<button class="tinybtn" id="btnChron">Chronicle</button>
<button class="tinybtn" id="btnOverlay">GPT Overlay</button>
<button class="tinybtn" id="btnSave">Force Save</button>
<button class="tinybtn" id="btnReset">Hard Reset</button>

<button class="tinybtn" id="btnMusic">Music: Off</button>

<label>
Vol
<input id="bgmVol" type="range" min="0" max="100" value="45">
</label>

<audio id="bgm" preload="auto" loop>
<source src="assets/bgm.mp3" type="audio/mpeg">
</audio>

</div>
</div>
</div>
</section>

</main>
</div>

<script src="game.js" defer></script>

</body>
</html>
